version: '3.8'

services:
  db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: kids_store
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db:/init.sql
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-u","root","-p1234"]
      interval: 5s
      timeout: 5s
      retries: 10
    
  app:
    build: .
    container_name: app-estoque
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: